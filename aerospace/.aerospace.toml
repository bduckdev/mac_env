after-startup-command = [
  # "exec-and-forget ~/.local/bin/startup",
  "exec-and-forget tmux new-session -d -s main",
  "exec-and-forget open -a 'WezTerm'",
]
start-at-login = true
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
accordion-padding = 15
default-root-container-layout = "tiles"
default-root-container-orientation = "auto"
# on-focus-changed = [
#  "exec-and-forget osascript -e 'tell application id \"tracesOf.Uebersicht\" to refresh widget id \"simple-bar-index-jsx\"'",
# ]
on-focus-changed = ["move-mouse window-lazy-center"]
# exec-on-workspace-change = [
#  "/bin/zsh",
#  "-c",
#  '/usr/bin/osascript -e "tell application id \"tracesOf.Uebersicht\" to refresh widget id \"simple-bar-index-jsx\""',
# ]
exec-on-workspace-change = [
  "/bin/bash",
  "-c",
  "sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE",
]
on-focused-monitor-changed = ["move-mouse monitor-lazy-center"]
automatically-unhide-macos-hidden-apps = true

[key-mapping]
preset = "qwerty"

[gaps]
inner.horizontal = 20
inner.vertical = 20
outer.left = 20
outer.bottom = 20
outer.top = [{ monitor."built-in" = 10 }, 40]
outer.right = 20

[mode.main.binding]
alt-enter = "exec-and-forget wezterm start"
alt-slash = "layout tiles horizontal vertical"
alt-period = "layout accordion horizontal vertical"
alt-h = "focus left"
alt-j = "focus down"
alt-k = "focus up"
alt-l = "focus right"
alt-shift-h = "move left"
alt-shift-j = "move down"
alt-shift-k = "move up"
alt-shift-l = "move right"
alt-minus = "resize smart -50"
alt-equal = "resize smart +50"
alt-1 = "workspace 1"
alt-2 = "workspace 2"
alt-3 = "workspace 3"
alt-4 = "workspace 4"
alt-5 = "workspace 5"
alt-6 = "workspace 6"
alt-7 = "workspace 7"
alt-8 = "workspace 8"
alt-9 = "workspace 9"
alt-0 = "workspace 10"
alt-backtick = "workspace 10"
alt-shift-1 = "move-node-to-workspace 1 --focus-follows-window"
alt-shift-2 = "move-node-to-workspace 2 --focus-follows-window"
alt-shift-3 = "move-node-to-workspace 3 --focus-follows-window"
alt-shift-4 = "move-node-to-workspace 4 --focus-follows-window"
alt-shift-5 = "move-node-to-workspace 5 --focus-follows-window"
alt-shift-6 = "move-node-to-workspace 6 --focus-follows-window"
alt-shift-7 = "move-node-to-workspace 7 --focus-follows-window"
alt-shift-8 = "move-node-to-workspace 8 --focus-follows-window"
alt-shift-9 = "move-node-to-workspace 9 --focus-follows-window"
alt-shift-0 = "move-node-to-workspace 10 --focus-follows-window"
alt-shift-q = "close"
alt-tab = "workspace-back-and-forth"
alt-shift-tab = "move-workspace-to-monitor --wrap-around next"
alt-shift-semicolon = "mode service"

[mode.service.binding]
esc = ["reload-config", "mode main"]
r = ["flatten-workspace-tree", "mode main"]
f = [
  "layout floating tiling",
  "mode main",
]
backspace = ["close-all-windows-but-current", "mode main"]
alt-shift-h = ["join-with left", "mode main"]
alt-shift-j = ["join-with down", "mode main"]
alt-shift-k = ["join-with up", "mode main"]
alt-shift-l = ["join-with right", "mode main"]
alt-shift-r = "reload-config"
down = "volume down"
up = "volume up"
shift-down = ["volume set 0", "mode main"]

[[on-window-detected]]
if.app-id = "com.spotify.client"
run = "move-node-to-workspace 10"

[[on-window-detected]]
if.app-id = "com.apple.reminders"
run = "move-node-to-workspace 1"

[[on-window-detected]]
if.app-id = "com.openai.chat"
run = "move-node-to-workspace 2"

[[on-window-detected]]
if.app-id = "com.github.wez.wezterm"
run = "move-node-to-workspace 3"

[[on-window-detected]]
if.app-id = "company.thebrowser.Browser"
run = "move-node-to-workspace 4"

[[on-window-detected]]
if.app-id = "com.brave.Browser"
run = "move-node-to-workspace 4"

[[on-window-detected]]
if.app-id = "com.apple.Safari"
run = "move-node-to-workspace 4"

[[on-window-detected]]
if.app-id = "io.remnote"
run = "move-node-to-workspace 5"

[[on-window-detected]]
if.app-id = "com.apple.iCal"
